<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cart | Verve & Vine</title>

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- PAGE STYLES -->
    <style>
        .cart-item {
            transition: 0.3s ease;
        }

        .cart-item:hover {
            transform: scale(1.02);
        }

        .checkout-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    
    <header>

        <nav class="navbar navbar-expand-lg px-4 bg-light">

            <a class="navbar-brand fw-bold" href="index.html">
                Verve & Vine
            </a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="product-details.html">Product Details</a></li>
                    <li class="nav-item"><a class="nav-link active" href="cart.html">Cart 🛒</a></li>

                </ul>

            </div>

        </nav>

    </header>

    <main>

        
        <section class="container my-5">

            <h1>Your Cart 🛒</h1>

        </section>

       
        <section class="container my-5">

            <div id="cartContainer"></div>

            <h3 class="mt-3">
                Total: P<span id="total">0</span>
            </h3>

        </section>

   
        <section class="container my-4">

            <div class="checkout-box shadow-sm">

                <h3>Checkout 💳</h3>

                <form>

                    <div class="row g-3">

                        <div class="col-md-6">
                            <input class="form-control" placeholder="Card Name">
                        </div>

                        <div class="col-md-6">
                            <input class="form-control" placeholder="Card Number">
                        </div>

                        <div class="col-md-6">
                            <input class="form-control" placeholder="Expiry">
                        </div>

                        <div class="col-md-6">
                            <input class="form-control" placeholder="CVV">
                        </div>

                    </div>

                    <button type="button" class="btn btn-dark w-100 mt-3" onclick="pay()">
                        Pay Now
                    </button>

                </form>

            </div>

        </section>

    </main>

    <!-- SCRIPT  -->
    <script>

        function loadCart() {

            let cart =
                JSON.parse(localStorage.getItem("cart")) || [];

            let container =
                document.getElementById("cartContainer");

            let total = 0;

            container.innerHTML = "";

            if (cart.length === 0) {

                container.innerHTML = "<p>Your cart is empty 😢</p>";
                return;

            }

            cart.forEach((item, index) => {

                total += item.price;

                container.innerHTML += `
                    <div class="card p-3 mb-2 cart-item">

                        <div class="d-flex align-items-center">

                            <img src="${item.img}" width="80" class="me-3 rounded" alt="Product">

                            <div class="flex-grow-1">
                                <h5>${item.name}</h5>
                                <p>P${item.price}</p>
                            </div>

                            <button class="btn btn-danger" onclick="removeItem(${index})">
                                Remove
                            </button>

                        </div>

                    </div>
                `;

            });

            document.getElementById("total").innerText = total;
        }

        function removeItem(i) {

            let cart =
                JSON.parse(localStorage.getItem("cart")) || [];

            cart.splice(i, 1);

            localStorage.setItem("cart", JSON.stringify(cart));

            loadCart();
        }

        function pay() {

            alert("Payment successful 🎉");

            localStorage.removeItem("cart");

            loadCart();
        }

        loadCart();

    </script>

</body>

</html>
